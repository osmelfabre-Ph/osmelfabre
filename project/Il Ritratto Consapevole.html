<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="slides-intro.jsx"></script>
<script type="text/babel" src="slides-parts-1-2.jsx"></script>
<script type="text/babel" src="slides-parts-3-4.jsx"></script>
<script>
  // ---------- Tweaks: live, tweakable controls ----------
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#C79A3E",
    "bg": "#F2ECE0",
    "bgAlt": "#1A1714",
    "coverScale": 82,
    "titleFont": "Cormorant Garamond"
  }/*EDITMODE-END*/;

  const TWEAKS = { ...TWEAK_DEFAULTS };

  function applyTweaks() {
    const r = document.documentElement.style;
    r.setProperty('--tw-accent', TWEAKS.accent);
    r.setProperty('--tw-bg', TWEAKS.bg);
    r.setProperty('--tw-bg-alt', TWEAKS.bgAlt);
    r.setProperty('--tw-cover-scale', TWEAKS.coverScale + '%');
    r.setProperty('--tw-title-font', '"' + TWEAKS.titleFont + '", Georgia, serif');
    document.querySelectorAll('img[src*="copertina"]').forEach((img) => {
      img.style.maxHeight = `calc(${TWEAKS.coverScale}% - 0px)`;
      img.style.maxWidth = `calc(${TWEAKS.coverScale}% - 0px)`;
    });
  }

  let tweakPanel = null;
  function buildPanel() {
    if (tweakPanel) return tweakPanel;
    const p = document.createElement('div');
    p.id = 'tweaks-panel';
    p.innerHTML = `
      <style>
        #tweaks-panel { position: fixed; right: 20px; bottom: 20px; z-index: 999999;
          width: 320px; background: #1A1714; color: #F2ECE0;
          font-family: 'Inter', sans-serif; font-size: 13px;
          padding: 18px 20px; border-radius: 4px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
          border: 1px solid rgba(242,236,224,.15); }
        #tweaks-panel h3 { margin: 0 0 16px; font-family: 'Cormorant Garamond', serif;
          font-size: 22px; font-weight: 400; letter-spacing: .05em;
          color: var(--tw-accent, #C79A3E); }
        #tweaks-panel label { display: block; margin: 14px 0 6px; font-size: 11px;
          letter-spacing: .18em; text-transform: uppercase; color: #A89E8D; }
        #tweaks-panel input[type="range"] { width: 100%; accent-color: var(--tw-accent); }
        #tweaks-panel input[type="color"] { width: 100%; height: 32px; border: 1px solid #3A342E;
          background: transparent; cursor: pointer; }
        #tweaks-panel select { width: 100%; padding: 6px; background: #2A2420; color: #F2ECE0;
          border: 1px solid #3A342E; font-family: inherit; font-size: 13px; }
        #tweaks-panel .val { float: right; color: var(--tw-accent); font-variant-numeric: tabular-nums; }
        #tweaks-panel .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      </style>
      <h3>Tweaks</h3>
      <label>Copertina — scala <span class="val" id="tw-scale-val">82%</span></label>
      <input type="range" id="tw-scale" min="40" max="100" step="1" value="82" />
      <div class="row">
        <div>
          <label>Accento</label>
          <input type="color" id="tw-accent" value="#C79A3E" />
        </div>
        <div>
          <label>Sfondo scuro</label>
          <input type="color" id="tw-bgalt" value="#1A1714" />
        </div>
      </div>
      <label>Sfondo crema</label>
      <input type="color" id="tw-bg" value="#F2ECE0" />
      <label>Font titoli</label>
      <select id="tw-font">
        <option>Cormorant Garamond</option>
        <option>EB Garamond</option>
        <option>Playfair Display</option>
        <option>Lora</option>
        <option>Georgia</option>
      </select>
    `;
    document.body.appendChild(p);

    const set = (k, v) => {
      TWEAKS[k] = v;
      applyTweaks();
      try {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      } catch(e){}
    };

    p.querySelector('#tw-scale').addEventListener('input', (e) => {
      const v = +e.target.value;
      p.querySelector('#tw-scale-val').textContent = v + '%';
      set('coverScale', v);
    });
    p.querySelector('#tw-accent').addEventListener('input', (e) => set('accent', e.target.value));
    p.querySelector('#tw-bgalt').addEventListener('input', (e) => set('bgAlt', e.target.value));
    p.querySelector('#tw-bg').addEventListener('input', (e) => set('bg', e.target.value));
    p.querySelector('#tw-font').addEventListener('change', (e) => set('titleFont', e.target.value));

    // Sync UI to current values
    p.querySelector('#tw-scale').value = TWEAKS.coverScale;
    p.querySelector('#tw-scale-val').textContent = TWEAKS.coverScale + '%';
    p.querySelector('#tw-accent').value = TWEAKS.accent;
    p.querySelector('#tw-bgalt').value = TWEAKS.bgAlt;
    p.querySelector('#tw-bg').value = TWEAKS.bg;
    p.querySelector('#tw-font').value = TWEAKS.titleFont;

    tweakPanel = p;
    return p;
  }

  // CSS hooks used by slide components (override palette + title font).
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    /* Cover image responds to --tw-cover-scale */
    img[src*="copertina"] { max-height: var(--tw-cover-scale, 82%) !important;
                            max-width: var(--tw-cover-scale, 82%) !important;
                            height: auto !important; width: auto !important; }
  `;
  document.head.appendChild(styleEl);

  applyTweaks();

  // Register listener FIRST, then announce availability.
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') {
      buildPanel().style.display = 'block';
    } else if (d.type === '__deactivate_edit_mode') {
      if (tweakPanel) tweakPanel.style.display = 'none';
    }
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}
</script>

<script>
  // Poll until all external text/babel scripts have finished transpiling
  // and exposed their Slide* components on window, then render.
  (function () {
    const names = [
      'SlideCover','SlideEpigraph','SlideWhy','SlideMethod','SlideStructure',
      'SlidePartI','SlideFotografoConsapevole','SlideTecnicaPresenza','SlideTreRespiri','SlideRelazioneImmagine','SlideCasoPaolo',
      'SlidePartII','SlideDistanze','SlideDistanzaCorpo','SlideVoceSilenzio',
      'SlidePartIII','SlideParolaSvela','SlideRapport','SlideAncore','SlideLuce',
      'SlidePartIV','SlideMeditazione','SlideOcchio','SlidePerChi','SlideFine'
    ];
    let tries = 0;
    function ready() { return names.every(n => typeof window[n] === 'function'); }
    function tryRender() {
      tries++;
      if (ready()) {
        names.forEach((n, i) => {
          const el = document.getElementById('s' + (i + 1));
          if (el) ReactDOM.createRoot(el).render(React.createElement(window[n]));
        });
        return;
      }
      if (tries < 300) setTimeout(tryRender, 50);
      else console.error('Slide components did not load in time.');
    }
    tryRender();
  })();
</script>
</body>
</html>
